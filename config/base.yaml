# ─────────────────────────────────────────────────────────────────────────────
# base.yaml — non-secret defaults for PLM Think Tank AI.
#
# Override locally:   config/local.yaml  (git-ignored)
# Override via env:   APP__SECTION__KEY=value  (double underscore separator)
# Secrets:            .env only — never put credentials here.
# ─────────────────────────────────────────────────────────────────────────────

app:
  name: "plm-think-tank-ai"
  env: "development"       # development | staging | production
  log_level: "INFO"

llm:
  provider: "thinktank"    # thinktank | openai | none
  model: "gemini-1.5-pro"
  temperature: 1.0
  max_tokens: 2048
  request_timeout: 120
  max_retries: 3

thinktank:
  base_url: "https://api-internal.target.com"
  chat_endpoint: "/gen_ai_model_requests/v1/chat/completions"
  app_name: "plm-think-tank-ai"   # sent as x-tgt-application request header
  tenant_id: ""
  token_env_var: "PLM_THINKTANK_TOKEN"
  is_prod: true                    # false for stage/dev OAuth endpoint

spark:
  host: "0.0.0.0"
  port: 8080

# ── MongoDB (used by plm-tcin-mapper; ignored by apps that don't depend on ai-mongo) ──
mongo:
  url: "mongodb://localhost:27017"
  database: "tcin_mapper"

# ── TCIN Mapper — matching thresholds ────────────────────────────────────────
matching:
  auto_confirm_threshold: 0.85
  no_match_threshold: 0.75
  llm_fallback_threshold: 0.60
  low_confidence_threshold: 0.50
  llm_ambiguity_band: 0.15

# ── TCIN Mapper — ingestion settings ─────────────────────────────────────────
# data_dir is resolved relative to the process working directory (monorepo root
# when launched via the Makefile). Override with APP__INGESTION__DATA_DIR.
ingestion:
  data_dir: "apps/plm-tcin-mapper/data/normalized"
  batch_size: 500
  skip_existing: true

# ── TCIN Mapper — eval guardrails ─────────────────────────────────────────────
eval:
  min_high_confidence_pct: 0.40
  max_low_confidence_pct: 0.20
  review_queue_backlog_limit: 1000
  min_avg_confidence: 0.60
