version: '3.8'

services:
  mongodb:
    image: mongo:7.0-alpine
    container_name: test-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test -u root -p password --authenticationDatabase admin
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - test-network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api.test
    container_name: test-api
    ports:
      - "8001:8080"
    environment:
      APP_PORT: "8080"
      APP_ENV: "development"
      LOG_LEVEL: "DEBUG"
      GUNICORN_WORKERS: "2"
      MONGO_URL: "mongodb://root:password@mongodb:27017"
      MONGO_DATABASE: "tcin_mapper"
      THINKTANK_API_KEY: "test-key"
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: curl -fsS http://localhost:8080/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - test-network

  client:
    build:
      context: .
      dockerfile: Dockerfile.client.test
    container_name: test-client
    ports:
      - "8080:8080"
    environment:
      APP_PORT: "8080"
      API_BASE_URL: "http://api:8080"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: curl -fsS http://localhost:8080/_stcore/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - test-network

volumes:
  mongodb_data:

networks:
  test-network:
    driver: bridge
